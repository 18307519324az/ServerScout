# development profile
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/serverscout?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    com.serverscout: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:please_change_me_at_least_32_chars}
    expiration-ms: 86400000
  scan:
    target-concurrency:
      use-redis: false
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:8080
