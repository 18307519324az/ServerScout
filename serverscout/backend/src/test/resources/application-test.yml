# test profile with in-memory H2
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: never

app:
  jwt:
    secret: test-secret-key-for-jwt-token-generation-must-be-long-enough
    expiration-ms: 3600000
  scan:
    nmap-path: /bin/echo
    nuclei-path: /bin/echo
    max-concurrent-tasks: 1