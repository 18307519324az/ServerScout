server:
  port: 8080

spring:
  application:
    name: server-scout

  datasource:
    url: jdbc:mysql://localhost:3306/serverscout?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
    open-in-view: false

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.serverscout: DEBUG
    org.springframework: WARN

app:
  jwt:
    secret: ServerScout2026SecretKeyForJWTTokenGenerationMustBeLongEnough
    expiration-ms: 86400000  # 24h
  scan:
    nmap-path: nmap
    nuclei-path: nuclei
    max-concurrent-tasks: 5
    default-timeout-seconds: 300
    http-probe-timeout: 3000
