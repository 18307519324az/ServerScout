server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: server-scout

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/serverscout?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
    open-in-view: false

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.serverscout: ${LOG_LEVEL:DEBUG}
    org.springframework: WARN

app:
  jwt:
    secret: ${JWT_SECRET:ServerScout2026SecretKeyForJWTTokenGenerationMustBeLongEnough}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  scan:
    nmap-path: ${NMAP_PATH:nmap}
    nuclei-path: ${NUCLEI_PATH:nuclei}
    max-concurrent-tasks: ${SCAN_MAX_CONCURRENT:5}
    default-timeout-seconds: ${SCAN_TIMEOUT:300}
    http-probe-timeout: ${HTTP_PROBE_TIMEOUT:3000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}
  webhook:
    dingtalk: ${WEBHOOK_DINGTALK:}
    feishu: ${WEBHOOK_FEISHU:}
    wecom: ${WEBHOOK_WECOM:}
