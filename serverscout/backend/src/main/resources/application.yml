server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: server-scout

  datasource:
    url: jdbc:mysql://localhost:3306/serverscout?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: serverscout
    password: 1A5089879282
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
    open-in-view: false

  flyway:
    enabled: false

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.serverscout: ${LOG_LEVEL:INFO}
    org.springframework: WARN

app:
  jwt:
    secret: ${JWT_SECRET:ServerScout2026SecretKeyForJWTTokenGenerationMustBeLongEnough}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  scan:
    nmap-path: ${NMAP_PATH:nmap}
    nuclei-path: ${NUCLEI_PATH:nuclei}
    max-concurrent-tasks: ${SCAN_MAX_CONCURRENT:5}
    default-timeout-seconds: ${SCAN_TIMEOUT:300}
    http-probe-timeout: ${HTTP_PROBE_TIMEOUT:3000}
  pdf:
    font-path: ${PDF_FONT_PATH:/usr/share/fonts/google-noto-cjk/NotoSansCJK-Regular.ttc}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:8080}
  webhook:
    dingtalk: ${WEBHOOK_DINGTALK:}
    feishu: ${WEBHOOK_FEISHU:}
    wecom: ${WEBHOOK_WECOM:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: ServerScout
    version: 1.0.0
    description: 服务器资产攻击面可视化分析平台

springdoc:
  swagger-ui:
    path: /docs
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /api-docs
