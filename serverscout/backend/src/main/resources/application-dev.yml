# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/serverscout?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    com.serverscout: DEBUG

app:
  jwt:
    secret: dev-secret-key-change-in-production
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:8080
