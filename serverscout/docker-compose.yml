version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: serverscout-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: serverscout
      MYSQL_USER: serverscout
      MYSQL_PASSWORD: 1A5089879282
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./serverscout-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: serverscout-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/serverscout?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: serverscout
      SPRING_DATASOURCE_PASSWORD: 1A5089879282
      JWT_SECRET: ServerScout2026SecretKeyForJWTTokenGenerationMustBeLongEnough
      JWT_EXPIRATION_MS: "86400000"
      NMAP_PATH: /usr/bin/nmap
      NUCLEI_PATH: /usr/bin/nuclei
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      LOG_LEVEL: INFO
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs

volumes:
  mysql_data:
  app_logs:
